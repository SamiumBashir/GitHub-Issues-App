<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-xl w-[420px] p-8 text-center">

<div class="flex justify-center mb-4">
<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-16">
</div>

<h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
<p class="text-gray-500 mb-6">Sign in to manage your issues</p>

<input id="username" type="text" placeholder="Enter Username"
class="w-full border rounded-lg p-3 mb-3">

<p class="text-sm text-blue-500 mb-2 text-left">Default: admin</p>

<input id="password" type="password" placeholder="Enter Password"
class="w-full border rounded-lg p-3 mb-3">

<p class="text-sm text-blue-500 mb-5 text-left">Default: admin123</p>

<button onclick="login()"
class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white p-3 rounded-lg">
Sign In
</button>

<div class="my-5 text-gray-400">OR</div>

<div class="bg-gray-100 p-4 rounded-lg text-sm">
<p><strong>Username:</strong> admin</p>
<p><strong>Password:</strong> admin123</p>
</div>

</div>

<script src="./app.js"></script>

</body>
</html>
